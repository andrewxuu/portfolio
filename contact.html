<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="Andrew Xu">
  <meta name="description" content="Get in touch with Andrew Xu, Systems & Level Designer.">
  <title>Andrew Xu | Contact</title>

  <script>
    (function () {
      try { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <nav class="site-nav" aria-label="Main navigation">
      <a class="brand" href="index.html">ANDREW XU</a>
      <div class="links">
        <a href="index.html">HOME</a>
        <a href="projects.html">PROJECTS</a>
        <a href="aboutme.html">ABOUT</a>
        <a class="active" aria-current="page" href="contact.html">CONTACT</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" style="margin-left:10px;">
          <span class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></span>
          <span id="themeLabel">Dark</span>
        </button>
      </div>
    </nav>
  </header>

  <main class="page">
    <span class="page-kicker">Send Message</span>
    <h1 class="page-title">GET IN <span>TOUCH</span></h1>

    <div class="contact-form">
      <div class="field">
        <div class="group-label">Name <span class="req">(required)</span></div>
        <div class="name-row">
          <div class="field">
            <label for="cf-first">First Name</label>
            <input type="text" id="cf-first" autocomplete="given-name">
          </div>
          <div class="field">
            <label for="cf-last">Last Name</label>
            <input type="text" id="cf-last" autocomplete="family-name">
          </div>
        </div>
      </div>
      <div class="field">
        <label for="cf-email">Email <span class="req">(required)</span></label>
        <input type="email" id="cf-email" autocomplete="email">
      </div>
      <div class="field">
        <label for="cf-message">Message <span class="req">(required)</span></label>
        <textarea id="cf-message"></textarea>
      </div>
      <button type="button" class="send-btn" id="cf-send">Send</button>
      <p class="form-note" id="cf-note">This opens your email app with the message ready to send.</p>
    </div>
  </main>

  <footer class="site-foot">
    <h2>Connect</h2>
    <div class="social">
      <a href="https://www.linkedin.com/in/andrew-l-xuu/" target="_blank" aria-label="LinkedIn">
        <span class="fa-brands fa-linkedin-in" aria-hidden="true"></span>
      </a>
      <a href="mailto:andrew.l.xuu@gmail.com" aria-label="Email Andrew Xu">
        <span class="fa-solid fa-envelope" aria-hidden="true"></span>
      </a>
      <a href="https://github.com/andrewxuu" target="_blank" aria-label="GitHub">
        <span class="fa-brands fa-github" aria-hidden="true"></span>
      </a>
      <a href="https://discord.com/users/377968184894160897" target="_blank" aria-label="Discord">
        <span class="fa-brands fa-discord" aria-hidden="true"></span>
      </a>
    </div>
    <p class="copyright">&copy; 2026 Andrew Xu. Built with HTML, CSS, and Bootstrap.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script>
    (function () {
      // ----- Theme toggle -----
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      var icon = document.getElementById('themeIcon');
      var label = document.getElementById('themeLabel');
      function sync() {
        var dark = root.classList.contains('dark');
        label.textContent = dark ? 'Light' : 'Dark';
        icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      }
      sync();
      btn.addEventListener('click', function () {
        root.classList.toggle('dark');
        try { localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light'); } catch (e) {}
        sync();
      });

      // ----- Contact form -> mailto -----
      var send = document.getElementById('cf-send');
      var note = document.getElementById('cf-note');
      send.addEventListener('click', function () {
        var first = document.getElementById('cf-first').value.trim();
        var last = document.getElementById('cf-last').value.trim();
        var email = document.getElementById('cf-email').value.trim();
        var message = document.getElementById('cf-message').value.trim();
        var name = (first + ' ' + last).trim();

        if (!first || !last || !email || !message) {
          note.textContent = 'Please fill in your first name, last name, email, and a message.';
          note.style.color = 'var(--red)';
          return;
        }

        var subjectLine = 'Portfolio inquiry from ' + name;
        var body = 'From: ' + name + ' (' + email + ')\n\n' + message;
        var href = 'mailto:andrew.l.xuu@gmail.com'
          + '?subject=' + encodeURIComponent(subjectLine)
          + '&body=' + encodeURIComponent(body);

        window.location.href = href;
        note.textContent = 'Opening your email app...';
        note.style.color = 'var(--ink-dim)';
      });
    })();
  </script>
</body>
</html>
