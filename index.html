  <!-- Apply saved theme before paint to avoid a flash -->
  <script>
    (function () {
      try { if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">

    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="style.css">

<body>
  <main class="p3-menu">

    <header class="p3-top">
      <a class="p3-brand" href="index.html">ANDREW XU · PORTFOLIO</a>
      <div class="p3-rule"></div>
      <span class="p3-year">2026</span>
      <div class="toggle-wrap">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></span>
          <span id="themeLabel">Dark</span>
        </button>
      </div>
    </header>

    <section class="p3-hero">
      <div class="p3-left">
        <span class="p3-tag">Player Profile</span>
        <h1 class="p3-name">AND<span>REW</span><br>XU</h1>
        <p class="p3-role">Systems &amp; Level Designer</p>
      </div>

      <div aria-hidden="true"></div>

      <nav class="p3-nav" aria-label="Main menu">
        <a class="active" aria-current="page" href="index.html">HOME</a>
        <a href="projects.html">PROJECTS</a>
        <a href="aboutme.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </section>

    <footer class="p3-foot">
      <span class="p3-prompt">&#9654; Select to continue</span>
      <div class="p3-social">
        <a href="https://www.linkedin.com/in/andrew-l-xuu/" target="_blank" aria-label="LinkedIn">
          <span class="fa-brands fa-linkedin-in" aria-hidden="true"></span>
        </a>
        <a href="mailto:andrew.l.xuu@gmail.com" aria-label="Email Andrew Xu">
          <span class="fa-solid fa-envelope" aria-hidden="true"></span>
        </a>
        <a href="https://github.com/andrewxuu" target="_blank" aria-label="GitHub">
          <span class="fa-brands fa-github" aria-hidden="true"></span>
        </a>
        <a href="https://discord.com/users/377968184894160897" target="_blank" aria-label="Discord">
          <span class="fa-brands fa-discord" aria-hidden="true"></span>
        </a>
      </div>
    </footer>
  </main>

  <script>
    (function () {
      var root = document.documentElement;
      var btn = document.getElementById('themeToggle');
      var icon = document.getElementById('themeIcon');
      var label = document.getElementById('themeLabel');
      function sync() {
        var dark = root.classList.contains('dark');
        label.textContent = dark ? 'Light' : 'Dark';
        icon.className = dark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      }
      sync();
      btn.addEventListener('click', function () {
        root.classList.toggle('dark');
        try { localStorage.setItem('theme', root.classList.contains('dark') ? 'dark' : 'light'); } catch (e) {}
        sync();
      });

      // Highlight whichever menu item the pointer is on
      var items = document.querySelectorAll('.p3-nav a');
      items.forEach(function (a) {
        a.addEventListener('mouseenter', function () {
          items.forEach(function (x) { x.classList.remove('active'); });
          a.classList.add('active');
        });
      });
    })();
  </script>
</body>
